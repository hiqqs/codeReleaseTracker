name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  windows_release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $tagVersion = "${env:GITHUB_REF_NAME}".TrimStart("v")
          if ($packageVersion -ne $tagVersion) {
            Write-Error "package.json version '$packageVersion' does not match tag '$tagVersion'."
          }

      - name: Publish Windows release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win:publish
